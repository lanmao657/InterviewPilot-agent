services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: interviewpilot
      POSTGRES_PASSWORD: interviewpilot
      POSTGRES_DB: interviewpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://interviewpilot:interviewpilot@db:5432/interviewpilot
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:24-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
